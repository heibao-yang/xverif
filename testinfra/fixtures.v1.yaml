  - id: xdebug.active_trace_phase4
    source_dir: xdebug/tests/active_trace_chain/phase4
    inputs: ["**/*.sv", "**/*.tcl"]
    extra_inputs: [testinfra/leaf/prepare_active_trace.py]
    builder:
      argv: [python3, "{repo}/testinfra/leaf/prepare_active_trace.py", --group, phase4, --source, "{repo}/xdebug/tests/active_trace_chain", --resources, "{resources}"]
      timeout_sec: 7200
    outputs:
      - {name: cases, path: cases, kind: dir}
    tool_env: [VERDI_HOME]

  - id: xdebug.active_trace_phase5
    source_dir: xdebug/tests/active_trace_chain/phase5
    inputs: ["*.sv", "*.tcl"]
    extra_inputs: [testinfra/leaf/prepare_active_trace.py]
    builder:
      argv: [python3, "{repo}/testinfra/leaf/prepare_active_trace.py", --group, phase5, --source, "{repo}/xdebug/tests/active_trace_chain", --resources, "{resources}"]
      timeout_sec: 1200
    outputs:
      - {name: cases, path: cases, kind: dir}
    tool_env: [VERDI_HOME]

  - id: xdebug.xif_event
    source_dir: xdebug/testdata/waveform/xif_agent_event
    inputs: [Makefile, filelist.f, "tb/**/*.sv", "scripts/*.py", "*.json"]
    builder:
      argv: [make, run, "OUT={resources}/out"]
      cwd: "{source}"
      default_env:
        XIF_AGENT: "{home}/xif_agent"
      timeout_sec: 1800
    outputs:
      - {name: fsdb, path: out/waves/xif_event_multi_if_test.fsdb, kind: file, min_bytes: 1024}
      - {name: daidir, path: out/simv.daidir, kind: dir}
      - {name: simulation_log, path: out/logs/xif_event_multi_if_test.log, kind: file, min_bytes: 1}
