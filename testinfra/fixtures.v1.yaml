      argv: [python3, "{repo}/testinfra/leaf/prepare_active_trace.py", --group, composite, --source, "{repo}/xdebug/tests/active_trace_chain", --resources, "{resources}"]
      timeout_sec: 7200
    outputs:
      - {name: cases, path: cases, kind: dir}
    tool_env: [VERDI_HOME]

  - id: xdebug.active_trace_timing
    source_dir: xdebug/tests/active_trace_chain/timing
