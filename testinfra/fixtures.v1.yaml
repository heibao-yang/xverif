    tool_env: [VERDI_HOME]

  - id: xloc.uvm
    build_capabilities: [make, vcs_uvm]
    source_dir: xloc
    inputs: [Makefile.fixture, "sv/*.sv", "tb/*.sv"]
    builder:
      argv: [make, -f, Makefile.fixture, all, "OUT_DIR={resources}/out"]
      cwd: "{source}"
      timeout_sec: 1200
    outputs:
      - {name: simulation_log, path: out/sim.log, kind: file, min_bytes: 1}
      - {name: daidir, path: out/simv.daidir, kind: dir}
    probes:
      - argv: [python3, "{repo}/testinfra/leaf/probe_fixture.py", --resources, "{resources}", --text-glob, out/sim.log, --require-text, UVM_ERROR]
    tool_env: [VERDI_HOME]
