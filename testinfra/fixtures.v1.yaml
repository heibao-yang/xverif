      - {name: daidir, path: out/simv.daidir, kind: dir}
      - {name: expected, path: out/stream_expected.json, kind: file, min_bytes: 1}
    tool_env: [VERDI_HOME]

  - id: xdebug.apb_vip
    source_dir: xdebug/testdata/waveform/apb_vip_real
    inputs: [Makefile, manifest.json, "**/*.sv", "**/*.svi"]
    builder:
      argv: [make, run, "OUTPUT_ROOT={resources}/out"]
      cwd: "{source}"
      default_env:
        SVT_VIP_INCDIR: "{home}/axi_test/test/include/sverilog"
        SVT_VIP_SRCDIR: "{home}/axi_test/test/src/sverilog/vcs"
      timeout_sec: 1800
    outputs:
      - {name: fsdb, path: out/regression/test/apb_vip_test/waves.fsdb, kind: file, min_bytes: 1024}
      - {name: daidir, path: out/regression/build/simv.daidir, kind: dir}
      - {name: simulation_log, path: out/regression/test/apb_vip_test/sim.log, kind: file, min_bytes: 1}
    tool_env: [VERDI_HOME]

  - id: xdebug.axi_vip
    source_dir: xdebug/testdata/waveform/axi_vip_real
    inputs: [Makefile, manifest.json, "**/*.sv", "**/*.svi"]
    builder:
      argv: [make, run, "OUTPUT_ROOT={resources}/out"]
      cwd: "{source}"
      default_env:
        AXI_REFERENCE_ROOT: "{home}/axi_test/test"
        SVT_VIP_INCDIR: "{home}/axi_test/test/include/sverilog"
        SVT_VIP_SRCDIR: "{home}/axi_test/test/src/sverilog/vcs"
      timeout_sec: 2400
    outputs:
      - {name: fsdb, path: out/regression/test/axi_multi_id_test/waves.fsdb, kind: file, min_bytes: 1024}
      - {name: daidir, path: out/regression/build/simv.daidir, kind: dir}
      - {name: simulation_log, path: out/regression/test/axi_multi_id_test/sim.log, kind: file, min_bytes: 1}
    tool_env: [VERDI_HOME]

  - id: xdebug.design_uart
    source_dir: xdebug/testdata/design/uart
    inputs: [dut.f, "*.sv"]
    builder:
      argv: [vcs, -full64, -sverilog, -kdb, "-debug_access+all", -f, "{source}/dut.f", -top, uart_16550, -o, "{resources}/simv"]
      cwd: "{source}"
      timeout_sec: 1200
    outputs:
      - {name: daidir, path: simv.daidir, kind: dir}
    tool_env: [VERDI_HOME]

  - id: xdebug.design_p3
    source_dir: xdebug/testdata/design/p3_semantics
    inputs: [p3_semantics.sv]
    builder:
      argv: [vcs, -full64, -sverilog, -kdb, "-debug_access+all", "{source}/p3_semantics.sv", -top, p3_sem_top, -o, "{resources}/simv"]
      cwd: "{source}"
      timeout_sec: 1200
    outputs:
      - {name: daidir, path: simv.daidir, kind: dir}
    tool_env: [VERDI_HOME]

  - id: xdebug.active_trace_runner
    source_dir: xdebug/tests/active_trace_chain
    inputs: [Makefile, chain_test.cpp, chain_test.h]
    builder:
      argv: [make, chain_test, "BUILD={resources}/build"]
      cwd: "{source}"
      timeout_sec: 600
    outputs:
      - {name: runner, path: build/chain_test, kind: file, min_bytes: 1024}
    tool_env: [VERDI_HOME]

  - id: xdebug.active_trace_p0
    source_dir: xdebug/tests/active_trace_chain/p0_composability
    inputs: ["**/*.sv", "**/*.tcl"]
    extra_inputs: [testinfra/leaf/prepare_active_trace.py]
    builder:
      argv: [python3, "{repo}/testinfra/leaf/prepare_active_trace.py", --group, p0, --source, "{repo}/xdebug/tests/active_trace_chain", --resources, "{resources}"]
      timeout_sec: 3600
    outputs:
      - {name: cases, path: cases, kind: dir}
    tool_env: [VERDI_HOME]

  - id: xdebug.active_trace_composite
    source_dir: xdebug/tests/active_trace_chain/composite
    inputs: ["**/*.sv", "**/*.tcl"]
    extra_inputs: [testinfra/leaf/prepare_active_trace.py]
